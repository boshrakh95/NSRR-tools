# Preprocessing Configuration for NSRR Data
# ==========================================
# Configuration for EDF → HDF5 signal preprocessing

# Output paths (relative to base_output)
paths:
  base_output: /scratch/boshra95/psg
  
  # Dataset-specific output directories
  stages:
    hdf5_signals: stages/derived/hdf5_signals
    annotations: stages/derived/annotations
    logs: stages/derived/logs
  
  shhs:
    hdf5_signals: shhs/derived/hdf5_signals
    annotations: shhs/derived/annotations
    logs: shhs/derived/logs
  
  apples:
    hdf5_signals: apples/derived/hdf5_signals
    annotations: apples/derived/annotations
    logs: apples/derived/logs
  
  mros:
    hdf5_signals: mros/derived/hdf5_signals
    annotations: mros/derived/annotations
    logs: mros/derived/logs

# Channel Selection Strategy
# ============================
# Control how many channels to process per modality for faster processing
# Change 'strategy' to switch between full processing and faster modes

channel_selection:
  # Strategy options: "sleepfm_full", "fast", "minimal"
  # - sleepfm_full: Use SleepFM paper limits (BAS=10, EKG=2, EMG=4, RESP=7) [23 max channels]
  # - fast: Reduced limits for faster processing (BAS=4, EKG=1, EMG=2, RESP=1) [8 channels]
  # - minimal: Bare minimum for quick testing (BAS=2, EKG=1, EMG=1, RESP=0) [4 channels]
  # - custom: Use custom limits defined below
  
  strategy: "sleepfm_full"  # Change this to "fast" for quick processing
  
  # Custom limits (used only when strategy="custom")
  # Adjust these values as needed for your specific use case
  custom_limits:
    BAS: 6     # Brain Activity Signals (EEG + EOG combined)
    EKG: 1     # Electrocardiography
    EMG: 2     # Electromyography
    RESP: 2    # Respiratory signals
    # Total: 11 channels in this example
  
  # NOTE: Channels are selected by priority order from modality_groups.yaml
  # Essential channels prioritized: C3-M2, C4-M1, LOC, ROC, EKG, CHIN, LLEG, RLEG, Thor, ABD

# Signal Processing Parameters
# All parameters are configurable and dataset-agnostic

processing:
  eeg:
    description: "EEG preprocessing parameters"
    filter_low: 0.3        # Hz
    filter_high: 35.0       # Hz
    target_sr: 128          # Hz (SleepFM requirement)
    filter_type: "bandpass"
    filter_order: 4
    filter_method: "butterworth"
    normalization: "zscore"  # or "robust", "minmax"
    detrend: true
    notch_filter: null      # Hz, null to disable
    
  eog:
    description: "EOG preprocessing parameters"
    filter_low: 0.3
    filter_high: 35.0
    target_sr: 128
    filter_type: "bandpass"
    filter_order: 4
    filter_method: "butterworth"
    normalization: "zscore"
    detrend: true
    notch_filter: null
    
  ecg:
    description: "ECG preprocessing parameters"
    filter_low: 0.5
    filter_high: 45.0
    target_sr: 128
    filter_type: "bandpass"
    filter_order: 4
    filter_method: "butterworth"
    normalization: "zscore"
    detrend: true
    notch_filter: null
    
  emg:
    description: "EMG preprocessing parameters"
    filter_low: 10.0
    filter_high: 100.0
    target_sr: 128
    filter_type: "bandpass"
    filter_order: 4
    filter_method: "butterworth"
    normalization: "zscore"
    detrend: false  # EMG typically doesn't need detrending
    notch_filter: null
    
  resp:
    description: "Respiratory signal preprocessing"
    filter_low: 0.05
    filter_high: 2.0
    target_sr: 128
    filter_type: "bandpass"
    filter_order: 4
    filter_method: "butterworth"
    normalization: "zscore"
    detrend: true
    notch_filter: null

# HDF5 output settings
hdf5:
  dtype: "float16"           # float16 or float32
  compression: "gzip"        # gzip, lzf, or null
  compression_level: 4       # 0-9 for gzip
  chunk_size: 38400          # 5 minutes @ 128 Hz
  chunks: true               # Enable chunked storage
  shuffle: true              # Improve compression
  fletcher32: false          # Checksum (slower but safer)

# Normalization options
normalization:
  zscore:
    description: "Z-score normalization (mean=0, std=1)"
    method: "zscore"
    robust: false
  
  robust_zscore:
    description: "Robust z-score using median and IQR"
    method: "zscore"
    robust: true
    
  minmax:
    description: "Min-max scaling to [0, 1]"
    method: "minmax"
    feature_range: [0, 1]

# Windowing/Segmentation
windowing:
  epoch_seconds: 30          # Standard sleep epoch
  chunk_seconds: 300         # 5 min chunks for SleepFM
  overlap: 0                 # Overlap between windows (0 = no overlap)
  min_chunk_duration: 60     # Minimum valid chunk duration (seconds)

# Masking parameters
masking:
  epoch_seconds: 30
  chunk_seconds: 300
  min_valid_ratio: 0.5       # Minimum valid data ratio for QC pass
  artifact_detection: false  # Enable/disable artifact detection
  artifact_method: "yasa"    # yasa, mne, or custom
  
# Quality control thresholds
quality_control:
  min_duration_hours: 4.0    # Minimum recording duration
  max_duration_hours: 14.0   # Maximum recording duration
  min_valid_ratio: 0.7       # Minimum valid data ratio
  max_flat_line_seconds: 30  # Maximum consecutive flat-line duration
  max_amplitude_std_ratio: 5.0  # Maximum std deviation ratio for outlier detection
  check_sampling_rate: true  # Verify sampling rate consistency
  allowed_sr_tolerance: 0.01 # Sampling rate tolerance (1%)

# Parallel processing
parallel:
  n_jobs: 4                  # Number of parallel workers
  backend: "loky"            # joblib backend: loky, threading, multiprocessing
  verbose: 1                 # Verbosity level
  batch_size: 10             # Subjects per batch
  
# Memory management
memory:
  max_ram_gb: 16             # Maximum RAM usage per worker
  use_memmap: false          # Use memory-mapped files for large arrays
  cache_dir: "/tmp/nsrr_cache"  # Temporary cache directory
  
# Logging
logging:
  level: "INFO"              # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_to_file: true
  log_dir: "logs"
  
# Progress tracking
progress:
  use_tqdm: true
  checkpoint_interval: 10    # Save progress every N subjects
  resume_from_checkpoint: true
